<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>View of post</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/posts.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <header>
      <div class="hero">
        <div class="hero-logo">
          <a href="index.html"
            ><img src="./images/clann-zu-logo.png" alt="clann zu"
          /></a>
        </div>
        <div class="hero-title">Clann Zú fan-site</div>

        <div class="hero-auth"></div>
      </div>
    </header>
    <nav><ul class="navbar-nav"></ul></nav>
    <article id="full-post-container" class="post-card">
      <h2 id="post-title">Загрузка...</h2>
      <small id="post-meta"></small>
      <hr />
      <br />
      <div class="post__img-block">
        <img
          id="post-img"
          class="post-img"
          src=""
          alt=""
          style="display: none"
        />
      </div>
      <p id="post-content" class="post-content"></p>
    </article>
    <footer id="footer"></footer>

    <script type="module" src="./js/single-post.js"></script>
    <script type="module" src="./js/app.js"></script>
    <script type="module" src="./js/navbar.js"></script>
    <script type="module" src="./js/footer.js"></script>
  </body>
</html>
